ascii-chess-ts/:
  d2/:
  public/:
  src/:
    app/:
      hooks.ts:
        useAppDispatch: wraps react-redux's dispatch hook using store's AppDispatch type
        useAppSelector: assigns store's RootState type using react-redux's typed selector hook
      selectors.ts:
        selectChessGame: base selector for chessGame state
        selectPositions: base selector for positions array
        selectHistory: base selector for history array
        selectCurrentPositionIndex: base selector for current position index
        selectFenHistory:
          uses: createSelector memoization
          requires: selectPositions, selectHistory
          returns: array of FEN strings for each position
        selectPieceData:
          uses: createSelector, ChessGame.countPiecesFromFen
          returns: memoized piece counts for all positions
        selectMobilityData:
          uses: createSelector, ChessGame.calculateMobilityFromFen
          returns: memoized mobility data for all positions
        selectPointData:
          uses: createSelector, piecePointValues map
          returns: memoized point counts (white/black) for all positions
        selectIsAtLatestPosition:
          uses: createSelector
          returns: boolean comparing currentIndex to positions length
      store.ts:
        rootReducer:
          chessGame: chessGameSlice.reducer
          liChessPuzzle: liChessPuzzleSlice.reducer
          chessComPuzzle: chessComPuzzleSlice.reducer
          selectedSetup: selectedSetupReducer
        store:
          reducer: rootReducer
        chessGameSlice.actions:
          - loadFen
          - makeMove
          - undoMove
          - goToPosition
          - goForward
          - goBackward
        AppDispatch: typeof store.dispatch
        RootState: ReturnType of type store.getState
    chess/:
      chessGame.test.ts:
        - ChessGame Class makeMove method updates the game state correctly
        - ChessGame Class setFen loads the FEN string correctly
        - ChessGame Class undoMove undoes the last move correctly
        - ChessGame Class getLastUCI returns the correct UCI for the last move
        - ChessGame Class asciiView returns the correct ASCII representation of the board
      chessGame.ts:
        ChessGame:
          getMobilityForBothSides:
            requires: white and black number parameters
            uses: getFen, getMoves, ChessGame class
            returns: an object of white and black move counts
          calculateMobilityFromFen:
            requires: fen string
            uses: ChessGame's getMobilityForBothSides method
            returns: untyped object with 3 counts - totalMoves, white, and black
          setDisplayMode: accessor connecting input PieceDisplayMode to instance PieceDisplayMode
          makeMove:
            requires: PGN string
            uses: ChessGame's move method
            returns: the result of the ChessGame.move method (with no type specification)
          countPiecesFromFen:
            requires: FEN string
            uses: hardcoded regex and iteration logic
            returns: an untyped object with white and black counts
          setFen: loads FEN string into game instance
          getFen: returns current FEN string from game instance
          undo: calls ChessGame instance's undo method and returns result
          getMoves: returns Move[] (verbose moves with from, to, san, promotion, etc.)
          getHistory: returns array of SAN moves from game history
          convertPieces:
            requires: ascii string
            returns: asterisks, symbols, or letters
            supports: ascii accessor
          getLastUCI: accessor with logic for acquiring most recent UCI; relies on ChessGame's history method
          ascii: accessor that uses ChessGame's ascii and convertPieces methods to support asciiView (TODO- naming convention; also seems redundant)
          asciiView: uses ChessGame's ascii method and the local asciiSub helper method to return boardLines
        asciiSub:
          requires: patternAscii, replacementAscii, asciiLines array
          uses: RegExp class, .map() method, string .replace method
          returns: modified asciiLines array
