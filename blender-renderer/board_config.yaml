# Chess Board Layer Configuration
# Defines multiple rendering layers with different styles and offsets

# Global board settings (shared across all layers)
global:
  board_half_width: 0.35270807  # USD board half width in meters
  board_scale: 13.8  # Scale factor for board
  square_spacing: 1.0  # Base spacing between squares

  # Piece orientation
  white_rotation_z: 1.5708  # 90° in radians (π/2) - white faces black
  black_rotation_z: -1.5708  # -90° in radians - black faces white

# Layer definitions (rendered in order)
layers:
  # Layer 1: 3D USD pieces and board
  - name: "3D Board"
    type: "usd"
    enabled: true
    z_offset: 0.0  # Z position (vertical offset)

    board:
      show: true
      import_usd: true

    pieces:
      scale: 5.0  # USD pieces are in meters, need larger scale
      use_usd_assets: true

      # Piece-specific rotations (applied after base white/black rotation)
      specific_rotations:
        rook:
          additional_z: -1.5708  # Additional -90° for rooks
        knight:
          additional_z: -1.5708  # Additional -90° for knights

  # Layer 2: ASCII text representation
  - name: "ASCII Board"
    type: "ascii"
    enabled: true
    z_offset: -1.0  # 1 meter below 3D board

    board:
      show: false  # No board plane needed
      checkerboard_material: false

    pieces:
      scale: 0.8
      style: "unicode_symbols"  # Use ♔♕♖♗♘♙ etc.

      # Text alignment
      align_x: "CENTER"
      align_y: "CENTER"

      # Colors
      white_color: [0.9, 0.9, 0.9, 1.0]
      black_color: [0.2, 0.2, 0.2, 1.0]

