global:
  board_half_width: 0.35270807
  board_scale: 13.8
  square_spacing: 1.0
  white_rotation_z: 1.5708
  black_rotation_z: -1.5708
layers:
  - name: "3D Board"
    type: "usd"
    enabled: true
    z_offset: 0.0
    board:
      show: true
      import_usd: true
    pieces:
      scale: 5.0
      use_usd_assets: true
      specific_rotations:
        rook:
          transform_coords: true
          white:
            rotation:
              x: 1.5708
              y: 0.0
              z: -1.5708
          black:
            rotation:
              x: 1.5708
              y: 0.0
              z: -1.5708
        knight:
          white:
            rotation:
              x: 0.0
              y: -1.5708
              z: 0.0
          black:
            rotation:
              x: 0.0
              y: 1.5708
              z: 0.0
  - name: "Adjacencies"
    type: "adjacencies"
    enabled: true
    z_offset: -1.5
    board:
      show: false
    glass_pane:
      show: true
      color: [0.02, 0.02, 0.05]
      alpha: 0.7
    asterisks:
      scale: 0.5
      color: [1.0, 1.0, 0.0, 1.0]
    edges:
      colors:
        adjacency: [0.118, 0.565, 1.0, 1.0]    # dodgerblue
        default:   [0.722, 0.525, 0.043, 1.0]  # darkgoldenrod
      thickness: 0.02
  - name: "Links"
    type: "links"
    enabled: true
    z_offset: -3
    board:
      show: false
    glass_pane:
      show: true
      color: [0.02, 0.02, 0.05]
      alpha: 0.7
    asterisks:
      scale: 0.5
      color: [1.0, 1.0, 0.0, 1.0]
    edges:
      colors:
        threat:     [0.863, 0.078, 0.235, 1.0]  # crimson
        protection: [0.133, 0.545, 0.133, 1.0]  # forestgreen
        default:    [0.722, 0.525, 0.043, 1.0]  # darkgoldenrod
      thickness: 0.02
  - name: "King Box"
    type: "king_box"
    enabled: true
    z_offset: -4.5
    board:
      show: false
    glass_pane:
      show: true
      color: [0.02, 0.02, 0.05]
      alpha: 0.7
    asterisks:
      scale: 0.5
      color: [1.0, 1.0, 0.0, 1.0]
    edges:
      colors:
        king_can_move: [0.133, 0.545, 0.133, 1.0]  # forestgreen
        king_blocked_ally: [0.722, 0.525, 0.043, 1.0]  # darkgoldenrod
        king_blocked_threat: [0.722, 0.525, 0.043, 1.0]  # darkgoldenrod
        default: [0.722, 0.525, 0.043, 1.0]  # darkgoldenrod
      thickness: 0.02
  - name: "Shadows"
    type: "shadows"
    enabled: true
    z_offset: -6
    board:
      show: false
    glass_pane:
      show: true
      color: [0.02, 0.02, 0.05]
      alpha: 0.7
    asterisks:
      scale: 0.5
      color: [1.0, 1.0, 0.0, 1.0]
    edges:
      colors:
        caster_threat: [1.0, 0.973, 0.863, 1.0]  # cornsilk
        caster_protection: [1.0, 0.973, 0.863, 1.0]  # cornsilk
        shadow_threat: [0.545, 0.0, 0.0, 1.0]    # darkred
        shadow_protection: [0.133, 0.545, 0.133, 1.0] # forestgreen
        default: [0.722, 0.525, 0.043, 1.0] # darkgoldenrod
      thickness: 0.02
  - name: "ASCII Board"
    type: "ascii"
    enabled: true
    z_offset: -7.5
    board:
      show: false
    glass_pane:
      show: true
      color: [0.02, 0.02, 0.05]
      alpha: 0.7
    pieces:
      scale: 0.8
      style: "unicode_symbols"
      align_x: "CENTER"
      align_y: "CENTER"
      white_color: [0.9, 0.9, 0.9, 1.0]
      black_color: [0.2, 0.2, 0.2, 1.0]
