global:
  board_half_width: 0.35270807
  board_scale: 13.8
  square_spacing: 1.0
  white_rotation_z: 1.5708
  black_rotation_z: -1.5708
layers:
  - name: "3D Board"
    type: "usd"
    enabled: true
    z_offset: 0.0
    board:
      show: true
      import_usd: true
    pieces:
      scale: 5.0
      use_usd_assets: true
      specific_rotations:
        rook:
          transform_coords: true  # Rooks need coordinate transformation: (x,y,z) -> (x,-z,y)
          white:
            rotation:
              x: 1.5708   # 90°
              y: 0.0      # 0°
              z: -1.5708  # -90°
          black:
            rotation:
              x: 1.5708   # 90°
              y: 0.0      # 0°
              z: -1.5708  # -90°
        knight:
          white:
            rotation:
              x: 0.0
              y: -1.5708  # -90°
              z: 0.0
          black:
            rotation:
              x: 0.0
              y: 1.5708   # 90°
              z: 0.0
  - name: "Adjacencies"
    type: "adjacencies"
    enabled: true
    z_offset: -1.5
    board:
      show: false
    asterisks:
      scale: 0.5
      color: [1.0, 1.0, 0.0, 1.0]
    edges:
      color: [1.0, 0.5, 0.0, 1.0]
      thickness: 0.02
  - name: "Links"
    type: "links"
    enabled: true
    z_offset: -3
    board:
      show: false
    asterisks:
      scale: 0.5
      color: [1.0, 1.0, 0.0, 1.0]
    edges:
      color: [1.0, 0.5, 0.0, 1.0]
      thickness: 0.02
  - name: "King Box"
    type: "king_box"
    enabled: true
    z_offset: -4.5
    board:
      show: false
    asterisks:
      scale: 0.5
      color: [1.0, 1.0, 0.0, 1.0]
    edges:
      color: [1.0, 0.5, 0.0, 1.0]
      thickness: 0.02
  - name: "ASCII Board"
    type: "ascii"
    enabled: true
    z_offset: -6
    board:
      show: false
    pieces:
      scale: 0.8
      style: "unicode_symbols"
      align_x: "CENTER"
      align_y: "CENTER"
      white_color: [0.9, 0.9, 0.9, 1.0]
      black_color: [0.2, 0.2, 0.2, 1.0]
